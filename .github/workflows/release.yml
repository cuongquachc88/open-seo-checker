name: Release

# ------------------------------------------------------------------------------
#  Builds source and binary bundles on every pushed tag matching v*.*.* or
#  release-v*.*.*, and publishes a GitHub Release with auto-generated notes.
#
#    Tag              Result
#    ---------------  ---------------------------------------------------
#    v0.1.0           Release "v0.1.0" published with assets:
#                       · open-seo-checker.zip       (Windows-friendly)
#                       · open-seo-checker.tar.gz    (macOS / Linux)
#    release-v0.1.0   Same release, named "v0.1.0" (release- prefix
#                       is stripped from the GitHub Release title)
#
#  The workflow does NOT run the e2e suite (tag is trusted because main
#  is always green); instead it does a fast lint + unit-test gate.
# ------------------------------------------------------------------------------

on:
  push:
    tags:
      - 'v*.*.*'
      - 'release-v*.*.*'
  workflow_dispatch:

# Allow only one concurrent release run.
concurrency:
  group: release
  cancel-in-progress: false

# Node 20 deprecation toggle (same as pages.yml).
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

permissions:
  contents: write  # required for softprops/action-gh-release to push artefacts

jobs:
  build:
    name: Build release artefacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Build API + dashboard
        run: pnpm build

      - name: Package platform bundles
        # Copy the install script + the prebuilt artefacts onto a single
        # tree that's tar/zip-friendly. Both archives include everything
        # the installer needs, so the recipient never has to run a build.
        # All final artefacts land under ./output/ so nothing leaks to the
        # workspace root.
        run: |
          set -euo pipefail
          STAGE="release-stage"
          OUTPUT="output"
          rm -rf "$STAGE" "$OUTPUT"
          mkdir -p "$STAGE" "$OUTPUT"
          # Public artefact paths. Keep the compiled API under packages/api/dist
          # so the launcher can resolve dependencies from packages/api/node_modules.
          cp -R public                  "$STAGE/public"
          mkdir -p "$STAGE/packages/api"
          cp -R packages/api/dist       "$STAGE/packages/api/dist"
          cp    install.sh              "$STAGE/install.sh"
          cp    install.bat             "$STAGE/install.bat"
          cp    open-seo-checker.sh     "$STAGE/open-seo-checker.sh"
          cp    open-seo-checker.bat    "$STAGE/open-seo-checker.bat"
          cp    start.sh                "$STAGE/start.sh"
          # Workspace files so pnpm install --prod can resolve dependencies
          # on the user's machine (native modules like better-sqlite3 are built
          # for the target platform at install time).
          mkdir -p "$STAGE/packages/web" "$STAGE/scripts"
          cp    package.json            "$STAGE/package.json"
          cp    pnpm-workspace.yaml     "$STAGE/pnpm-workspace.yaml"
          cp    pnpm-lock.yaml          "$STAGE/pnpm-lock.yaml"
          cp    packages/api/package.json "$STAGE/packages/api/package.json"
          cp    packages/web/package.json "$STAGE/packages/web/package.json"
          cp    scripts/postinstall.mjs "$STAGE/scripts/postinstall.mjs"
          chmod +x "$STAGE/install.sh" "$STAGE/open-seo-checker.sh" "$STAGE/start.sh"
          # Build both archive formats into ./output/ — never anywhere else.
          (cd "$STAGE" && tar czf "$GITHUB_WORKSPACE/$OUTPUT/open-seo-checker.tar.gz" .)
          (cd "$STAGE" && zip -qr  "$GITHUB_WORKSPACE/$OUTPUT/open-seo-checker.zip" .)
          # Belt-and-braces: confirm no tarball / zip artefact escaped to
          # the workspace root, fail the job if so.
          for ext in tar.gz zip tgz; do
            leaked="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -name "open-seo-checker.$ext" -print -quit)"
            [ -z "$leaked" ] || { echo "::error::$leaked slipped out of output/"; exit 1; }
          done
          echo
          echo "===== output/ ====="
          ls -la "$OUTPUT"
          rm -rf "$STAGE"

      - name: Compute release name
        id: release_name
        run: |
          TAG="${{ github.ref_name }}"
          NAME="${TAG#release-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Release name: $NAME (from tag $TAG)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_name.outputs.name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.release_name.outputs.name, '-') }}
          body: |
            ## ${{ steps.release_name.outputs.name }}

            Self-contained bundles of Open SEO Checker at this tag.

            - **`open-seo-checker.zip`** — Windows. Unzip and double-click
              `install.bat`.
            - **`open-seo-checker.tar.gz`** — macOS / Linux. Extract and run
              `./install.sh`.

            Both installers drop a desktop shortcut that starts the server
            and opens the dashboard with a single double-click. See the
            full [manual install guide](docs/index.html) for the headless /
            CI path.
          files: |
            output/open-seo-checker.tar.gz
            output/open-seo-checker.zip
