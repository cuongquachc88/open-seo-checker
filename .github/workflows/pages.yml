name: Deploy GitHub Pages

# ------------------------------------------------------------------------------
#  Builds the static documentation site from the in-repo docs/ folder and
#  publishes it to GitHub Pages (https://<owner>.github.io/<repo>/).
#
#  - Triggers on every push to main and on manual dispatch.
#  - Uses the official `actions/deploy-pages` + `actions/upload-artifact`
#    pair, so the Pages source is "GitHub Actions" — no branch needs to be
#    configured for Pages in the repo settings beyond enabling the env.
#
#  One-time setup (required because the GitHub App token does NOT have
#  the privilege to create a Pages site programmatically on this repo):
#    1.  Settings  ->  Pages  ->  Source: "GitHub Actions"
#    2.  Allow the workflow to write to the `github-pages` environment
#        the first time it runs.
#    3.  Push to main. The first successful run will publish
#        https://<owner>.github.io/<repo>/  to show docs/index.html.
#
#  Notes on `enablement`: we deliberately do NOT pass enablement: true
#  to `actions/configure-pages@v5`. Org / repo policies commonly forbid
#  the integration token from calling the Pages create endpoint and the
#  job fails with "Resource not accessible by integration". Resolving
#  it required bumping the integration scope admin-side; until then,
#  the manual enable step above is the supported path.
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent deploys corrupting each other.
concurrency:
  group: pages
  cancel-in-progress: false

# GitHub is deprecating Node 20 on Actions runners. The Pages stack
# calls Node harness underneath; opting in to the unsecure-version
# shim keeps the job green on a single env-var toggle.
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

# Pages needs write access to publish and an OIDC token to sign the
# artifact; keep `contents: read` so checkout stays minimal.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # We do NOT pass `enablement: true` here: the integration token
        # typically lacks privilege to create a Pages site. The repo
        # owner must enable Pages in Settings -> Pages first; this
        # step then just queries the existing config.

      - name: Stage site
        # Promote docs/index.html to the top-level so the deployed URL
        # `https://<owner>.github.io/<repo>/` lands directly on the
        # landing page.
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R docs/. _site/
          echo
          echo "===== site root ====="
          ls -la _site
          echo
          echo "===== site root .html files ====="
          find _site -maxdepth 1 -type f -name '*.html' | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
